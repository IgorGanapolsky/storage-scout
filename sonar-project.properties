# SonarCloud Configuration
sonar.projectKey=IgorGanapolsky_storage-scout
sonar.organization=igorganapolsky

# Project info
sonar.projectName=AEO Autopilot
sonar.projectVersion=1.0.0

# Source paths (Python only)
sonar.sources=autonomy
sonar.tests=autonomy/tests
sonar.test.inclusions=autonomy/tests/**/*.py

# Exclusions
# Note: runtime and generated state paths are excluded.
sonar.exclusions=\
  autonomy/tests/**,\
  **/node_modules/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/coverage/**,\
  **/data/**,\
  **/*.json
sonar.cpd.exclusions=autonomy/tests/**

# Coverage (Python)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate (non-blocking to avoid CI failures)
sonar.qualitygate.wait=false
